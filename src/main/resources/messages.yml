# ================================================================
# DrcomoVEX - 消息配置文件
# 支持颜色码 (&a, &c, 等) 和 PlaceholderAPI 占位符
# ================================================================

# 所有插件消息
messages:
  # 成功消息
  success:
    # 参数: {variable}, {value}
    get: "&r圗 &#ffdb5a变量: &e变量 &#ffffff{variable} &e的值: &#ffffff{value}"
    # 参数: {variable}, {value}
    set: "&r圗 &#ffdb5a变量: &e已将变量 &#ffffff{variable} &e设置为: &#ffffff{value}"
    # 参数: {variable}, {value}, {new_value}
    add: "&r圗 &#ffdb5a变量: &e已将变量 &#ffffff{variable} &e增加 &#ffffff{value}&e, 当前值: &#ffffff{new_value}"
    # 参数: {variable}, {value}, {new_value}
    remove: "&r圗 &#ffdb5a变量: &e已从变量 &#ffffff{variable} &e中移除 &#ffffff{value}&e, 当前值: &#ffffff{new_value}"
    # 参数: {variable}, {value}
    reset: "&r圗 &#ffdb5a变量: &e已重置变量 &#ffffff{variable}&e, 当前值: &#ffffff{value}"
    reload: "&r圗 &#ffdb5a变量: &e配置文件已重载完成！"
    # 参数: {count}
    player-query-summary: "&r圗 &#ffdb5a变量: &e符合条件的玩家数: &#ffffff{count}"
    # 参数: {count}, {action}, {variable}
    player-bulk-dryrun: "&r圗 &#ffdb5a变量: &e预演完成，预计影响玩家: &#ffffff{count}&e，操作: &#ffffff{action}&e，变量: &#ffffff{variable}"
    # 参数: {success}, {failed}, {variable}
    player-bulk-done: "&r圗 &#ffdb5a变量: &e批量操作完成，成功: &#ffffff{success}&e，失败: &#ffffff{failed}&e，变量: &#ffffff{variable}"
    # 参数: {action}, {variable}, {target}
    global-bulk-dryrun: "&r圗 &#ffdb5a变量: &e预演完成，操作: &#ffffff{action}&e，变量: &#ffffff{variable}&e，目标: &#ffffff{target}"
    # 参数: {variable}, {result}
    global-bulk-done: "&r圗 &#ffdb5a变量: &e全局变量批量操作完成，变量: &#ffffff{variable}&e，结果: &#ffffff{result}"
    # 参数: {file}, {players}, {matches}
    player-query-saved: "&r圗 &#ffdb5a变量: &e已导出批量查询结果到: &#ffffff{file} &e(玩家: &#ffffff{players}&e, 匹配项: &#ffffff{matches}&e)"
    
    # 全局变量操作
    # 参数: {variable}, {value}
    global-get: "&r圗 &#ffdb5a变量: &e全局变量 &#ffffff{variable} &e的值: &#ffffff{value}"
    # 参数: {variable}, {value}
    global-set: "&r圗 &#ffdb5a变量: &e已将全局变量 &#ffffff{variable} &e设置为: &#ffffff{value}"
    # 参数: {variable}, {value}, {new_value}
    global-add: "&r圗 &#ffdb5a变量: &e已将全局变量 &#ffffff{variable} &e增加 &#ffffff{value}&e, 当前值: &#ffffff{new_value}"
    # 参数: {variable}, {value}, {new_value}
    global-remove: "&r圗 &#ffdb5a变量: &e已从全局变量 &#ffffff{variable} &e中移除 &#ffffff{value}&e, 当前值: &#ffffff{new_value}"
    # 参数: {variable}, {value}
    global-reset: "&r圗 &#ffdb5a变量: &e已重置全局变量 &#ffffff{variable}&e, 当前值: &#ffffff{value}"
    
    # 玩家变量操作
    # 参数: {player}, {variable}, {value}
    player-get: "&r圗 &#ffdb5a变量: &e玩家 &#ffffff{player} &e的变量 &#ffffff{variable} &e值: &#ffffff{value}"
    # 参数: {player}, {variable}, {value}
    player-set: "&r圗 &#ffdb5a变量: &e已将玩家 &#ffffff{player} &e的变量 &#ffffff{variable} &e设置为: &#ffffff{value}"
    # 参数: {player}, {variable}, {value}, {new_value}
    player-add: "&r圗 &#ffdb5a变量: &e已将玩家 &#ffffff{player} &e的变量 &#ffffff{variable} &e增加 &#ffffff{value}&e, 当前值: &#ffffff{new_value}"
    # 参数: {player}, {variable}, {value}, {new_value}
    player-remove: "&r圗 &#ffdb5a变量: &e已从玩家 &#ffffff{player} &e的变量 &#ffffff{variable} &e中移除 &#ffffff{value}&e, 当前值: &#ffffff{new_value}"
    # 参数: {player}, {variable}, {value}
    player-reset: "&r圗 &#ffdb5a变量: &e已重置玩家 &#ffffff{player} &e的变量 &#ffffff{variable}&e, 当前值: &#ffffff{value}"

  # 错误消息
  error:
    no-permission: "&r㜯 &#ff868a变量: &c你没有权限执行这个操作！"
    # 参数: {command}
    unknown-command: "&r㜯 &#ff868a变量: &c未知的子命令: &#ffffff{command}&c，请使用 &#ffffff/vex help &c查看帮助。"
    # 参数: {variable}
    variable-not-found: "&r㜯 &#ff868a变量: &c变量 &#ffffff{variable} &c不存在！"
    # 参数: {player}
    player-not-found: "&r㜯 &#ff868a变量: &c玩家 &#ffffff{player} &c不存在或从未登入过服务器！"
    # 参数: {reason}
    operation-failed: "&r㜯 &#ff868a变量: &c操作失败: &#ffffff{reason}"
    internal: "&r㜯 &#ff868a变量: &c内部错误，请联系管理员！"
    # 参数: {reason}
    export-failed: "&r㜯 &#ff868a变量: &c导出失败: &#ffffff{reason}"
    console-specify-player: "&r㜯 &#ff868a变量: &c控制台必须指定玩家！使用 &#ffffff-p:玩家名或UUID &c参数。"
    reload-failed: "&r㜯 &#ff868a变量: &c重载配置失败，请检查控制台错误信息！"
    # 参数: {op}
    invalid-operator: "&r㜯 &#ff868a变量: &c无效的比较符: &#ffffff{op} &c，可用: &#ffffff> >= < <= == !="
    # 参数: {value}
    invalid-number: "&r㜯 &#ff868a变量: &c无效的数值: &#ffffff{value}"
    # 参数: {limit}
    limit-exceeded: "&r㜯 &#ff868a变量: &c超过最大限制: &#ffffff{limit}"
    no-candidates: "&r㜯 &#ff868a变量: &c没有符合条件的对象"
    
    # 子命令错误
    # 参数: {command}
    unknown-player-subcommand: "&r㜯 &#ff868a变量: &c未知的玩家子命令: &#ffffff{command}&c，支持的命令: &#ffffffget, set, add, remove, reset"
    # 参数: {command}
    unknown-global-subcommand: "&r㜯 &#ff868a变量: &c未知的全局子命令: &#ffffff{command}&c，支持的命令: &#ffffffget, set, add, remove, reset"
    
    # 指令格式说明
    usage-player-command: "&r㜯 &#ff868a变量: &c用法: &#ffffff/vex player <get|set|add|remove|reset> ..."
    usage-global-command: "&r㜯 &#ff868a变量: &c用法: &#ffffff/vex global <get|set|add|remove|reset> ..."
    
    # 玩家变量用法
    usage-player-get: "&r㜯 &#ff868a变量: &c用法: &#ffffff/vex player get <玩家|UUID> <变量名> [--offline]"
    usage-player-set: "&r㜯 &#ff868a变量: &c用法: &#ffffff/vex player set <玩家|UUID> <变量名> <值> [--offline]"
    usage-player-add: "&r㜯 &#ff868a变量: &c用法: &#ffffff/vex player add <玩家|UUID> <变量名> <值> [--offline]"
    usage-player-remove: "&r㜯 &#ff868a变量: &c用法: &#ffffff/vex player remove <玩家|UUID> <变量名> <值> [--offline]"
    usage-player-reset: "&r㜯 &#ff868a变量: &c用法: &#ffffff/vex player reset <玩家|UUID> <变量名> [--offline]"
    
    # 全局变量用法
    usage-global-get: "&r㜯 &#ff868a变量: &c用法: &#ffffff/vex global get <变量名>"
    usage-global-set: "&r㜯 &#ff868a变量: &c用法: &#ffffff/vex global set <变量名> <值>"
    usage-global-add: "&r㜯 &#ff868a变量: &c用法: &#ffffff/vex global add <变量名> <值>"
    usage-global-remove: "&r㜯 &#ff868a变量: &c用法: &#ffffff/vex global remove <变量名> <值>"
    usage-global-reset: "&r㜯 &#ff868a变量: &c用法: &#ffffff/vex global reset <变量名>"

    # 使用说明
    usage-get: "&r㜯 &#ff868a变量: &c用法: &#ffffff/vex get <变量名> [-p:玩家ID]"
    usage-set: "&r㜯 &#ff868a变量: &c用法: &#ffffff/vex set <变量名> <值> [-p:玩家ID]"
    usage-add: "&r㜯 &#ff868a变量: &c用法: &#ffffff/vex add <变量名> <值> [-p:玩家ID]"
    usage-remove: "&r㜯 &#ff868a变量: &c用法: &#ffffff/vex remove <变量名> <值> [-p:玩家ID]"
    usage-reset: "&r㜯 &#ff868a变量: &c用法: &#ffffff/vex reset <变量名> [-p:玩家ID]"

  # 帮助信息
  help:
    header: "&r䙷 &#ff87f2变量: &d=== DrcomoVEX 指令帮助 (/vex) ==="
    commands:
      - "&r䙷 &#ff87f2变量: &d-- 玩家变量(单人) --"
      - "&r䙷 &#ff87f2变量: &d/vex player get <玩家名|UUID> <变量名> [--offline]"
      - "&r䙷 &#ff87f2变量: &d  参数: <玩家名|UUID>=&#ffffff目标玩家 &d| <变量名>=&#ffffff变量Key &d| [--offline]=允许离线"
      - "&r䙷 &#ff87f2变量: &d/vex player set <玩家名|UUID> <变量名> <值> [--offline]"
      - "&r䙷 &#ff87f2变量: &d  参数: <值>=写入值(字符串原样；数值型变量请填数值)"
      - "&r䙷 &#ff87f2变量: &d/vex player add|give <玩家名|UUID> <变量名> <增量> [--offline]"
      - "&r䙷 &#ff87f2变量: &d  参数: <增量>=当前值 + 增量(要求可解析为数字)"
      - "&r䙷 &#ff87f2变量: &d/vex player remove <玩家名|UUID> <变量名> <减量> [--offline]"
      - "&r䙷 &#ff87f2变量: &d  参数: <减量>=当前值 - 减量(要求可解析为数字)"
      - "&r䙷 &#ff87f2变量: &d/vex player reset <玩家名|UUID> <变量名> [--offline]"
      - "&r䙷 &#ff87f2变量: &d  说明: reset 会恢复为变量配置的初始/重置逻辑结果(不是简单清空)"
      - "&r䙷 &#ff87f2变量: &d-- 玩家变量(批量/通配/数据库) --"
      - "&r䙷 &#ff87f2变量: &d/vex player get * <变量通配[:条件]> [--out:文件名.yml] [--db-only|--online-only] [--player:<...>]"
      - "&r䙷 &#ff87f2变量: &d  参数: *=批量模式 | <变量通配>=匹配变量Key | [:条件]=按值过滤(数值比较)"
      - "&r䙷 &#ff87f2变量: &d/vex player set|add|remove * <变量通配> <值或增量> [-n] [--limit N] [--db-only|--online-only] [--player:<...>]"
      - "&r䙷 &#ff87f2变量: &d  参数: [-n]=预演不写入 | [--limit]=最多影响 N 个(默认100/最大1000)"
      - "&r䙷 &#ff87f2变量: &d/vex player reset * <变量通配[:条件]> [-n] [--limit N] [--db-only|--online-only] [--player:<...>]"
      - "&r䙷 &#ff87f2变量: &d  参数: reset 批量写入不需要 <值>；可配 [:条件] 先筛选再重置"
      - "&r䙷 &#ff87f2变量: &d/vex player reset <玩家名|UUID> <变量通配[:条件]> [-n] [--limit N] [--db-only|--online-only]"
      - "&r䙷 &#ff87f2变量: &d  说明: 单玩家 + 变量通配(一次重置该玩家多个变量)"
      - "&r䙷 &#ff87f2变量: &d-- 全局变量 --"
      - "&r䙷 &#ff87f2变量: &d/vex global get <变量名>"
      - "&r䙷 &#ff87f2变量: &d/vex global set|add|remove <变量名> <值>"
      - "&r䙷 &#ff87f2变量: &d/vex global reset <变量名>"
      - "&r䙷 &#ff87f2变量: &d/vex global get <变量通配[:条件]> - 通配查询(只匹配已加载的全局变量Key)"
      - "&r䙷 &#ff87f2变量: &d/vex global set|add|remove <变量通配> <值> [-n] - 通配写入(支持预演)"
      - "&r䙷 &#ff87f2变量: &d/vex global reset <变量通配> [-n] - 通配重置(支持预演)"
      - "&r䙷 &#ff87f2变量: &d-- 其他 --"
      - "&r䙷 &#ff87f2变量: &d/vex reload - 完全重载插件(onDisable + onEnable；期间可能短暂卡顿)"
      - "&r䙷 &#ff87f2变量: &d/vex help - 显示本帮助"
      - "&r䙷 &#ff87f2变量: &d-- 示例 --"
      - "&r䙷 &#ff87f2变量: &d查询并导出(仅数据库): &#ffffff/vex player get * coins:>=100 --db-only --out:rich.yml"
      - "&r䙷 &#ff87f2变量: &d预演批量扣除: &#ffffff/vex player remove * coins 50 -n --db-only --limit 20"
      - "&r䙷 &#ff87f2变量: &d仅在线批量增加: &#ffffff/vex player add * xp 10 --online-only --player:Steve,Alex"
      - "&r䙷 &#ff87f2变量: &d单玩家通配重置: &#ffffff/vex player reset Steve pvp_* -n --limit 10"
      - "&r䙷 &#ff87f2变量: &d-- 参数释义(批量) --"
      - "&r䙷 &#ff87f2变量: &d&#ffffff--db-only &d=仅扫描数据库(离线持久化值)；适合离线盘点/导出/批处理"
      - "&r䙷 &#ff87f2变量: &d&#ffffff--online-only &d=仅扫描在线内存(实时值)；只影响在线玩家"
      - "&r䙷 &#ff87f2变量: &d&#ffffff--out:<文件名.yml> &d=导出批量查询结果到 &#ffffffplugins/DrcomoVEX/exports/"
      - "&r䙷 &#ff87f2变量: &d&#ffffff--player:<A,B,...> &d=仅对指定玩家集合生效(同义: --players/--target)"
      - "&r䙷 &#ff87f2变量: &d&#ffffff--limit <N> &d=限制本次批量写入最多影响 N 个候选(默认100/最大1000)"
      - "&r䙷 &#ff87f2变量: &d&#ffffff-n &d=预演(不会写入数据库/内存)，先用它确认影响范围"
    footer: "&r䙷 &#ff87f2变量: &d提示: 先用 &#ffffff-n &d预演确认影响范围；批量操作需要对应权限的 &#ffffff.others"
    flags:
      - "&r䙷 &#ff87f2变量: &d参数说明(Flags)"
      - "&r䙷 &#ff87f2变量: &d&#ffffff--offline &7- &d单人命令允许解析离线玩家"
      - "&r䙷 &#ff87f2变量: &d&#ffffff-n &7/ &#ffffff--dry-run &7- &d预演模式(只展示预计变化，不执行写入)"
      - "&r䙷 &#ff87f2变量: &d&#ffffff--limit <N> &7- &d批量写入最多影响 N 个(默认100，最大1000)"
      - "&r䙷 &#ff87f2变量: &d&#ffffff--out:<文件.yml> &7- &d导出批量查询结果到 &#ffffffplugins/DrcomoVEX/exports/"
      - "&r䙷 &#ff87f2变量: &d&#ffffff--db-only &7- &d仅扫描数据库(离线持久化值；可能滞后于实时值)"
      - "&r䙷 &#ff87f2变量: &d&#ffffff--online-only &7- &d仅扫描在线内存(只影响在线玩家；实时值)"
      - "&r䙷 &#ff87f2变量: &d提示: 不要同时使用 &#ffffff--db-only &d与 &#ffffff--online-only"
      - "&r䙷 &#ff87f2变量: &d&#ffffff--player:<...> &7/ &#ffffff--players:<...> &7/ &#ffffff--target:<...> &7- &d批量命令仅作用于指定玩家集合"
      - "&r䙷 &#ff87f2变量: &d通配符: &#ffffff* &d匹配任意长度；&#ffffff? &d匹配单字符；匹配不区分大小写"
      - "&r䙷 &#ff87f2变量: &d条件过滤(数值): &#ffffff<变量通配>:<比较符><数值> &d例如 &#ffffffcoins:>=100 &d(> >= < <= == !=)"
      - "&r䙷 &#ff87f2变量: &d数据库值显示: STRICT:... 会自动还原为原始值显示(不影响实际存储)"

  # 信息提示
  info:
    # 参数: {player}, {old}, {new}
    player-bulk-preview-item: "&r䙷 &#ff87f2变量: &d玩家: &#ffffff{player} &d旧值: &#ffffff{old} &d→ 新值: &#ffffff{new}"
    # 参数: {player}, {value}
    player-query-item: "&r䙷 &#ff87f2变量: &d&#ffffff{value}"
    plugin-version: "&r䙷 &#ff87f2变量: &dDrcomoVEX 版本: &#ffffff{version}"
    author: "&r䙷 &#ff87f2变量: &d作者: &#ffffffBaiMo"
    description: "&r䙷 &#ff87f2变量: &d基于直觉设计的服务器变量管理系统"
    website: "&r䙷 &#ff87f2变量: &d官网: &#ffffffhttps://github.com/DragonBaiMo/DrcomoVEX"

  # 统计信息
  stats:
    # 参数: {count}
    total-variables: "&r䙷 &#ff87f2变量: &d已加载变量: &#ffffff{count}"
    # 参数: {type}
    database-type: "&r䙷 &#ff87f2变量: &d数据库类型: &#ffffff{type}"
    # 参数: {status}
    database-status: "&r䙷 &#ff87f2变量: &d数据库状态: &#ffffff{status}"
    # 参数: {size}
    cache-size: "&r䙷 &#ff87f2变量: &d缓存大小: &#ffffff{size}"

  # 更新通知
  update:
    # 参数: {latest}, {current}
    available: "&r䙷 &#ff87f2变量: &d[更新] 发现新版本 &#ffffff{latest}&d！当前版本: &#ffffff{current}"
    # 参数: {url}
    download: "&r䙷 &#ff87f2变量: &d[更新] 下载地址: &#ffffff{url}"
    no-update: "&r䙷 &#ff87f2变量: &d当前已是最新版本！"

  # 调试信息
  debug:
    # 参数: {variable}
    variable-loaded: "&r䙷 &#ff87f2变量: &d[调试] 已加载变量: &#ffffff{variable}"
    # 参数: {key}
    cache-hit: "&r䙷 &#ff87f2变量: &d[调试] 缓存命中: &#ffffff{key}"
    # 参数: {key}
    cache-miss: "&r䙷 &#ff87f2变量: &d[调试] 缓存未命中: &#ffffff{key}"
    # 参数: {sql}
    database-query: "&r䙷 &#ff87f2变量: &d[调试] 数据库查询: &#ffffff{sql}"

  # 占位符示例
  placeholders:
    examples:
      - "&r䙷 &#ff87f2变量: &d占位符示例:"
      - "&r䙷 &#ff87f2变量: &d%drcomovex_[var]_[变量名]% - 获取变量值"
      - "&r䙷 &#ff87f2变量: &d%drcomovex_[player]_[变量名]% - 获取玩家变量值"
      - "&r䙷 &#ff87f2变量: &d%drcomovex_[global]_[变量名]% - 获取服务器变量值"

  # 特殊消息类型
  special:
    # ActionBar 消息
    actionbar:
      variable-updated: "&r䙷 &#ff87f2变量: &d变量已更新: &#ffffff{variable} &d= &#ffffff{value}"

    # Title 消息
    title:
      welcome:
        title: "&r䙷 &#ff87f2变量: &d欢迎使用 DrcomoVEX"
        subtitle: "&r䙷 &#ff87f2变量: &d基于直觉设计的变量管理系统"

# 多语言支持配置
language:
  # 默认语言
  default: "zh_CN"

  # 支持的语言列表
  supported:
    - "zh_CN"
    - "en_US"
